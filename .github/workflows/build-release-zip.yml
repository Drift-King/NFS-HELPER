name: Build Release Zip

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Create ZIP of addon
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p release
          ZIP_NAME="release/NFS-HELPER-${VERSION}.zip"

          zip -r "$ZIP_NAME" nfs_helper/

          echo "ZIP created:"
          ls -lh release/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release/NFS-HELPER-${{ github.ref_name }}.zip
