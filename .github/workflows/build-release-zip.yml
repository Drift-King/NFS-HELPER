name: Build Release Zip

on:
  release:
    types: [published]   # Trigger when release is published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP of addon
        run: |
          VERSION=${{ github.event.release.tag_name }}
          ZIP_NAME="NFS-HELPER-${VERSION}.zip"

          mkdir -p release
          zip -r "release/$ZIP_NAME" nfs_helper

          echo "Created release/$ZIP_NAME"

      - name: Upload ZIP to existing release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          artifact: "release/NFS-HELPER-${{ github.event.release.tag_name }}.zip"
          allowUpdates: true      # update existing release
          updateOnlyUnreleased: false  # ensures existing release gets updated
