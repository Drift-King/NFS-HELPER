name: Build Zip & Upload Release
on:
  push:
    tags:
      - '*'  # Trigger on any tag push

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP of nfs_helper folder
        run: |
          TAG=${GITHUB_REF_NAME#refs/tags/}  # Extract tag name
          ZIP_NAME="NFS-HELPER-${TAG}.zip"

          if [ ! -d "nfs_helper" ]; then
            echo "Folder nfs_helper/ not found. Skipping ZIP creation."
            exit 0
          fi

          mkdir -p release
          zip -r "release/$ZIP_NAME" nfs_helper/
          echo "Created release/$ZIP_NAME"

      - name: Upload ZIP to GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          artifacts: release/NFS-HELPER-${{ github.ref_name }}.zip
