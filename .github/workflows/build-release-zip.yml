name: Build Release Zip

on:
  release:
    types: [published]    # Trigger when a release is published
  workflow_dispatch:       # Allow manual trigger

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP of addon
        run: |
          VERSION=${{ github.event.release.tag_name }}
          ZIP_NAME="NFS-HELPER-${VERSION}.zip"

          mkdir -p release
          zip -r "release/$ZIP_NAME" nfs_helper

          echo "Created release/$ZIP_NAME"

      - name: Upload or Update ZIP on release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.release.tag_name }}
          name: ${{ github.event.release.tag_name }}
          artifact: "release/NFS-HELPER-${{ github.event.release.tag_name }}.zip"
          allowUpdates: true            # Updates existing release if tag exists
          updateOnlyUnreleased: false   # Ensures existing releases are updated
          makeLatest: true              # Marks this release as latest
