name: Build Blender Add-on ZIP

on:
  release:
    types: [published]  # triggers when a release is published

jobs:
  build_zip:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set version from release tag
      - name: Set version
        run: |
          RELEASE_VERSION=${GITHUB_REF#refs/tags/}
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV

      # 3. Create a ZIP with only nfs_helper/ contents
      - name: Build Blender ZIP
        run: |
          if [ ! -d "nfs_helper" ]; then
            echo "Folder nfs_helper/ not found. Exiting."
            exit 1
          fi

          mkdir -p release
          # Move into nfs_helper/ and zip its contents so ZIP is flat
          cd nfs_helper
          zip -r "../release/NFS-HELPER-${RELEASE_VERSION}.zip" ./*
          cd ..

          echo "Created release/NFS-HELPER-${RELEASE_VERSION}.zip"

      # 4. Upload ZIP as release asset
      - name: Upload release ZIP
        uses: softprops/action-gh-release@v1
        with:
          files: "release/NFS-HELPER-${RELEASE_VERSION}.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
