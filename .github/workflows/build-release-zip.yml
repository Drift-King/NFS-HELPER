name: Build Zip & Create Release

on:
  release:
    types: [published]  # Trigger on published releases
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP of addon
        run: |
          VERSION=${GITHUB_REF_NAME}
          ZIP_NAME="NFS-HELPER-${VERSION}.zip"

          mkdir -p release
          zip -r "release/$ZIP_NAME" nfs_helper/

          echo "Created release/$ZIP_NAME"

      - name: Create GitHub Release and upload ZIP
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}       # GitHub release tag = pushed tag
          name: ${{ github.ref_name }}      # Release name = tag
          draft: false
          prerelease: false
          files: "release/NFS-HELPER-${{ github.ref_name }}.zip"  # ZIP filename includes tag
