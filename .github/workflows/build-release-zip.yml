name: Build Blender Add-on ZIP + Update Docs

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build_release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Build Blender ZIP
      - name: Build Blender ZIP
        run: |
          mkdir -p release
          zip -r release/NFS-HELPER-${GITHUB_REF_NAME}.zip nfs_helper
          ls -l release

      # 3️⃣ Calculate size & SHA256
      - name: Calculate size & SHA256
        id: zipinfo
        run: |
          ZIP_FILE=release/NFS-HELPER-${GITHUB_REF_NAME}.zip
          SIZE_BYTES=$(stat -c%s "$ZIP_FILE")
          SIZE_KB=$(awk "BEGIN {printf \"%.1f\", $SIZE_BYTES/1024}")
          HASH=$(sha256sum "$ZIP_FILE" | cut -d ' ' -f1)
          echo "zip_size_bytes=$SIZE_BYTES" >> $GITHUB_OUTPUT
          echo "zip_size_kb=$SIZE_KB" >> $GITHUB_OUTPUT
          echo "zip_sha256=$HASH" >> $GITHUB_OUTPUT

      # 4️⃣ Upload ZIP to release
      - name: Upload release ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: release/NFS-HELPER-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5️⃣ Update index.json
      - name: Update docs/index.json
        run: |
          FILE_URL="https://github.com/Drift-King/NFS-HELPER/releases/download/${GITHUB_REF_NAME}/NFS-HELPER-${GITHUB_REF_NAME}.zip"

          # Ensure docs folder exists
          mkdir -p docs

          # Create index.json if missing
          if [ ! -f docs/index.json ]; then
            echo '{"version":"v1","data":[]}' > docs/index.json
          fi

          # Remove existing entry for this version
          jq --arg ver "${GITHUB_REF_NAME}" '.data |= map(select(.version != $ver))' docs/index.json > docs/index.tmp.json
          mv docs/index.tmp.json docs/index.json

          # Add new entry
          jq --arg name "NFS Helper" \
             --arg version "${GITHUB_REF_NAME}" \
             --arg url "$FILE_URL" \
             --arg manifest "nfs_helper/blender_manifest.toml" \
             --argjson size ${{ steps.zipinfo.outputs.zip_size_bytes }} \
             --arg hash "${{ steps.zipinfo.outputs.zip_sha256 }}" \
             '.data += [{"name": $name, "version": $version, "url": $url, "manifest": $manifest, "size": $size, "sha256": $hash}]' \
             docs/index.json > docs/index.tmp.json && mv docs/index.tmp.json docs/index.json

          # Commit and push index.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.json
          git commit -m "Update index.json for release ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push

      # 6️⃣ Update releases.html
      - name: Update docs/releases.html
        run: |
          ./update-html.sh release/NFS-HELPER-${GITHUB_REF_NAME}.zip ${GITHUB_REF_NAME} ${{ steps.zipinfo.outputs.zip_size_kb }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/releases.html
          git commit -m "Update releases.html for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push