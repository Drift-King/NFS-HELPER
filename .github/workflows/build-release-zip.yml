name: Build Blender Add-on ZIP

on:
  release:
    types: [published]

jobs:
  build_zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Blender ZIP
        run: |
          zip -r NFS-HELPER-${GITHUB_REF_NAME}.zip nfs_helper \
            -x "*.github*" "docs/*" "*.gitignore" "LICENSE"
          ls -l  # verify ZIP exists

      - name: Upload release ZIP
        uses: softprops/action-gh-release@v1
        with:
          files: NFS-HELPER-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
