name: Build Blender Add-on ZIP

on:
  release:
    types: [published]

jobs:
  build_zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set release version
        run: echo "RELEASE_VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # Debug: verify folder exists
      - name: List repo contents
        run: ls -R

      - name: Build Blender ZIP
        run: |
          mkdir -p release
          zip -r release/NFS-HELPER-$RELEASE_VERSION.zip nfs_helper \
            -x "*.github*" "docs/*" "*.gitignore" "LICENSE"
          # Debug: list ZIP contents
          unzip -l release/NFS-HELPER-$RELEASE_VERSION.zip

      - name: Upload release ZIP
        uses: softprops/action-gh-release@v1
        with:
          files: release/NFS-HELPER-$RELEASE_VERSION.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
