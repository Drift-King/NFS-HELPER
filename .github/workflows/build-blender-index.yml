name: Build Blender Index

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Wait a few seconds to ensure the release assets are available
      - name: Wait for release assets
        run: sleep 10

      - name: Fetch releases from GitHub API
        run: |
          curl -s https://api.github.com/repos/${{ github.repository }}/releases > releases.json

      - name: Build index.json
        run: |
          mkdir -p docs
          echo '{"version":"v1","blocklist":[],"data":[]}' > docs/index.json

          jq -c '.[]' releases.json | while read release; do
            TAG=$(echo "$release" | jq -r '.tag_name')

            # Normalize version (remove leading "v")
            VERSION=$(echo "$TAG" | sed 's/^v//')

            # Find the ZIP asset
            ASSET=$(echo "$release" | jq -c '.assets[] | select(.name | endswith(".zip"))')

            if [ -z "$ASSET" ]; then
              echo "No ZIP found for $TAG, skipping"
              continue
            fi

            URL=$(echo "$ASSET" | jq -r '.browser_download_url')
            SIZE=$(echo "$ASSET" | jq -r '.size')

            echo "Processing version $VERSION"

            # Download the ZIP to calculate SHA256
            curl -L "$URL" -o temp.zip
            HASH=$(sha256sum temp.zip | awk '{print $1}')

            # Append release info to index.json
            jq --arg version "$VERSION" \
               --arg url "$URL" \
               --arg hash "sha256:$HASH" \
               --argjson size "$SIZE" \
               '.data += [{
                 "schema_version": "1.0.0",
                 "id": "nfs_helper",
                 "name": "NFS Texture Helper",
                 "tagline": "Helper panel for texture alpha assignment and shadows",
                 "version": $version,
                 "type": "add-on",
                 "maintainer": "XXJOHNATHANXX",
                 "license": ["SPDX:GPL-2.0-or-later"],
                 "blender_version_min": "4.2.0",
                 "website": "https://github.com/Drift-King/nfs-helper",
                 "tags": ["Utilities"],
                 "archive_url": $url,
                 "archive_size": $size,
                 "archive_hash": $hash
               }]' docs/index.json > tmp.json && mv tmp.json docs/index.json

          done

      # Semantic version sort (newest first, safely)
      - name: Sort index.json by semantic version
        run: |
          jq '.data |= map(.version = (.version | tostring | ltrimstr("v"))) 
              | .data |= sort_by((.version | split(".") | map(tonumber))) | reverse' docs/index.json > tmp.json && mv tmp.json docs/index.json

      - name: Build index.html
        run: |
          cat <<EOF > docs/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>NFS Texture Helper Downloads</title>
            <style>
              body { font-family: Arial; padding: 20px; }
              li { margin: 10px 0; }
            </style>
          </head>
          <body>
            <h1>NFS Texture Helper</h1>
            <ul>
          EOF

          # Loop through JSON in semantic version order
          jq -r '.data
                 | sort_by((.version | split(".") | map(tonumber))) 
                 | reverse
                 | .[]
                 | "<li><b>\(.version)</b> - <a href=\"\(.archive_url)\">Download</a> (\(.archive_size) bytes)</li>"' docs/index.json \
            >> docs/index.html

          cat <<EOF >> docs/index.html
            </ul>
          </body>
          </html>
          EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add docs/index.json docs/index.html
          git commit -m "Update Blender index files" || echo "No changes to commit"
          git push